  >

  <meta name="theme-color" content="#080b12">

  <title>Video Reward</title>

  <!-- Telegram Mini Apps official script -->

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #080b12;
      --card: rgba(20, 25, 38, 0.82);
      --card-light: rgba(255, 255, 255, 0.06);
      --text: #ffffff;
      --muted: #949bad;
      --primary: #7657ff;
      --primary-light: #9d72ff;
      --cyan: #22d3ee;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(
          circle at 10% 0%,
          rgba(118, 87, 255, 0.22),
          transparent 35%
        ),
        radial-gradient(
          circle at 100% 30%,
          rgba(34, 211, 238, 0.12),
          transparent 30%
        ),
        var(--bg);

      color: var(--text);

      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      padding-bottom: 95px;
    }

    button {
      font: inherit;
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: auto;
    }

    .header {
      padding:
        calc(18px + env(safe-area-inset-top))
        18px
        16px;

      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;

      display: grid;
      place-items: center;

      font-size: 22px;

      background:
        linear-gradient(
          135deg,
          var(--primary),
          var(--cyan)
        );

      box-shadow:
        0 10px 30px rgba(118, 87, 255, 0.35);
    }

    .brand-text h1 {
      font-size: 17px;
      font-weight: 750;
    }
